name: 🔧 기타 작업
description: 배포, 프로젝트 세팅, 환경 설정 등 기능 개발 외 작업
title: "[ETC] "
labels: ["etc"]
body:
  - type: dropdown
    id: category
    attributes:
      label: 작업 유형
      options:
        - 프로젝트 세팅 (의존성, 빌드 설정 등)
        - 배포 (CI/CD, 서버 설정 등)
        - 문서 작성 / README
        - 리팩토링
        - 기타
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: 작업 내용
      placeholder: 무엇을 할 건가요?
    validations:
      required: true
  - type: textarea
    id: tasks
    attributes:
      label: 작업 항목
      placeholder: |
        - [ ] 항목 1
        - [ ] 항목 2
