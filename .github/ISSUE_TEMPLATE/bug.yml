name: 🐞 Bug
description: 버그 제보
title: "[BUG] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: 버그 설명
      placeholder: 어떤 문제가 발생했나요?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 재현 방법
      placeholder: |
        1. ...
        2. ...
  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
