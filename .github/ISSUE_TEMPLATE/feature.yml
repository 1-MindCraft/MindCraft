name: ✨ Feature
description: 새로운 기능을 추가할 때 사용
title: "[FEAT] "
labels: ["feature"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 기능 요약
      placeholder: 어떤 기능인가요?
    validations:
      required: true
  - type: textarea
    id: tasks
    attributes:
      label: 작업 항목
      placeholder: |
        - [ ] 항목 1
        - [ ] 항목 2
  - type: dropdown
    id: area
    attributes:
      label: 담당 영역
      options:
        - Frontend (React)
        - Backend (Spring Boot)
        - AI/LLM
        - DB / 설계
        - 기타
    validations:
      required: true
